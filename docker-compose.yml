services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: chessdb
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chesspass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d chessdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: chessdb
      DB_USER: chess
      DB_PASSWORD: chesspass
      JWT_SECRET: change-this-to-a-long-random-secret-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
